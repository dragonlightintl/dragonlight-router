name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff==0.15.12
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[all,dev]"
      - run: mypy src/dragonlight_router/

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install bandit==1.9.4
      - run: bandit -r src/dragonlight_router/ -c pyproject.toml

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Verify dependency hashes
        if: hashFiles('requirements-hashed.txt') != ''
        run: pip install --require-hashes -r requirements-hashed.txt
      - name: Install dependencies
        run: pip install -e ".[all,dev]"
      - name: Run tests
        run: pytest --cov=dragonlight_router --cov-report=term-missing --cov-report=xml --cov-fail-under=100
      - name: Upload coverage
        if: matrix.python-version == '3.12' && github.event_name == 'push'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[all]"
      - name: Import check
        run: |
          python -c "from dragonlight_router import __version__; print(f'Version: {__version__}')"
          python -c "from dragonlight_router import RouterEngine; print('RouterEngine imported successfully')"

  all-pass:
    name: All checks pass
    if: always()
    needs: [lint, typecheck, security, test, smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All checks passed."

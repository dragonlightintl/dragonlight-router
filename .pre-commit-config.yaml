repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic==2.12.5
          - pyyaml==6.0.3
          - httpx==0.28.1
          - structlog==25.5.0
          - types-PyYAML
        args: [--config-file=pyproject.toml]
        pass_filenames: false
        entry: mypy src/

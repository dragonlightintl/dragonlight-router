[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dragonlight-router"
version = "0.1.0"
description = "Multi-provider intelligent routing — model selection + cascade dispatch"
license = {text = "MIT"}
authors = [{name = "Korrigon @ Dragonlight International"}]
keywords = ["llm", "routing", "ai", "multi-provider", "openai", "anthropic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "httpx>=0.25",
    "structlog>=23.0",
    "returns>=0.22",
]

[project.optional-dependencies]
server = ["starlette>=0.30", "uvicorn>=0.24"]
adapters = ["openai>=1.50"]
cache = ["aiosqlite>=0.19"]
all = ["dragonlight-router[server,adapters,cache]"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "mypy>=1.10",
    "ruff>=0.4",
]

[project.scripts]
dragonlight-router = "dragonlight_router.server.app:main"

[project.urls]
Homepage = "https://github.com/dragonlightintl/dragonlight-router"
Repository = "https://github.com/dragonlightintl/dragonlight-router"
Issues = "https://github.com/dragonlightintl/dragonlight-router/issues"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--cov=dragonlight_router --cov-report=term-missing --cov-fail-under=80"

[tool.mypy]
strict = true
python_version = "3.11"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]

[tool.setuptools.packages.find]
where = ["src"]
